<svg width="100%" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crtGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a0f"/>
      <stop offset="100%" stop-color="#000705"/>
    </linearGradient>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.25"/>
      <rect y="2" width="4" height="2" fill="#000000" opacity="0"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="900" height="220" rx="10" fill="url(#crtGlow)"/>

  <g font-family="'Courier New', monospace" fill="#3dffa0">
    <text x="40" y="55" font-size="13" opacity="0.6">root@state-of-freedom:~$ whoami</text>

    <text x="40" y="105" font-size="40" font-weight="bold" filter="url(#textGlow)">
      &gt; VITOR_
      <animate attributeName="opacity" values="1;1;0.3;1;1" dur="3.2s" repeatCount="indefinite"/>
    </text>

    <text x="40" y="140" font-size="16" opacity="0.85">
      founder &amp; developer @ State Of Freedom (SA-MP)
    </text>

    <text x="40" y="165" font-size="13" opacity="0.55">
      [ pawn ] [ node.js ] [ mysql ] [ php ] [ js/ts ]
    </text>

    <rect x="330" y="128" width="11" height="18" fill="#3dffa0">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="900" height="220" fill="url(#scan)"/>
  <rect width="900" height="220" rx="10" fill="url(#vignette)"/>
  <rect width="900" height="220" rx="10" fill="none" stroke="#3dffa0" stroke-opacity="0.3" stroke-width="1"/>

  <rect width="900" height="220" fill="#3dffa0" opacity="0">
    <animate attributeName="opacity" values="0;0.03;0" dur="0.15s" repeatCount="indefinite"/>
  </rect>
</svg>
